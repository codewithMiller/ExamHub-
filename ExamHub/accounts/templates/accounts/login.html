{% extends 'exam/base.html'%}

{% block content %}
<header class="bg-dark py-5" style="background: linear-gradient(135deg, #1f1f1f, #343a40);">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder" style="letter-spacing: 2px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5);">
                Sign in
            </h1>
        </div>
    </div>
</header>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 my-5" style="border-radius: 15px; background: #2b2b2b;">
                <div class="card-body p-5">
                {% if messages %}
    {% for msg in messages %}
        <div class="alert alert-danger mb-3">{{ msg }}</div>
    {% endfor %}
{% endif %}
                    <form method="POST" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="text" class="form-control form-control-lg" name="username" placeholder="Username" 
                                   style="border-radius: 12px; background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 15px;">
                        </div>
                        <div class="mb-4">
                            <input type="password" class="form-control form-control-lg" name="password" placeholder="Password" 
                                   style="border-radius: 12px; background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 15px;">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" 
                                    style="background: linear-gradient(135deg, #6f42c1, #d63384); border: none; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); padding: 12px 0; font-weight: 600; letter-spacing: 1px;">
                                Login
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3" style="background: transparent; border-top: none;">
                    <small class="text-white-50">Don't have an account? <a href="{% url 'register' %}" style="color: #d63384; text-decoration: none;">Sign up</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
