{% extends 'exam/base.html' %}
{% block title %}Create Exam{% endblock %}
{% block content %}
<div class="container fadein" style="max-width:560px;">
  <div class="page-header">
    <h1>✏️ Create Exam</h1>
    <p>Set up your exam details first, then add questions.</p>
  </div>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Exam Title *</label>
        <input type="text" name="title" placeholder="e.g. Biology Midterm — Chapter 4" autofocus required>
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea name="description" placeholder="Brief description of this exam..."></textarea>
      </div>
      <div class="form-group">
        <label>Duration (minutes)</label>
        <input type="number" name="duration" value="30" min="1" max="300">
      </div>
      <hr>
      <div class="flex gap-2">
        <button type="submit" class="btn btn-primary">Create & Add Questions →</button>
        <a href="{% url 'manage_exams' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
